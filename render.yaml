services:
  - type: web
    name: chatflow-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://<HOST>:<PORT>/<DATABASE>
      - key: SPRING_DATASOURCE_USERNAME
        value: <USER>
      - key: SPRING_DATASOURCE_PASSWORD
        value: <PASSWORD>
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://<your-frontend-name>.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://<your-frontend-name>.onrender.com,http://localhost:5173,http://localhost:3000
      - key: PORT
        value: 8080

  - type: static
    name: chatflow-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://<your-backend-name>.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
