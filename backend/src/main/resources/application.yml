spring:
  application:
    name: chatflow-backend
  
  datasource:
    url: jdbc:h2:mem:chatflow
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true

server:
  port: 8080

app:
  jwt:
    secret: chatflow-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000

logging:
  level:
    com.chatflow: DEBUG
    org.springframework.security: INFO
