spring:
  application:
    name: chatflow-backend
  
  datasource:
    url: jdbc:h2:file:./data/chatflow;AUTO_SERVER=TRUE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

  h2:
    console:
      enabled: true

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  port: ${PORT:8080}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: chatflow-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
    access-token-expiration: 3600000
    refresh-token-expiration: 86400000
  upload:
    dir: uploads

logging:
  level:
    com.chatflow: DEBUG
    org.springframework.security: INFO
