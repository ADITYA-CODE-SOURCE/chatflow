spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

  h2:
    console:
      enabled: false

app:
  jwt:
    secret: ${JWT_SECRET}
  upload:
    dir: /tmp/chatflow-uploads

logging:
  level:
    com.chatflow: INFO
    org.springframework.security: INFO
